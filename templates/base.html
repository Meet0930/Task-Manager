{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Task Manager{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'tasks/styles.css' %}?v=11">
  <link rel="icon" href="data:,">
  <script defer src="{% static 'tasks/app.js' %}?v=11"></script>
</head>
<body data-page="{% block page_name %}home{% endblock %}">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="{% url 'home' %}">
        <span class="brand-mark">TM</span>
        <span class="brand-copy">
          <strong>Task Manager</strong>
          <small>Simple work tracking</small>
        </span>
      </a>
      <button class="icon-btn nav-toggle" type="button" data-nav-toggle aria-label="Open menu">☰</button>
      <nav class="topnav" data-nav>
        <a href="{% url 'home' %}" data-nav-home>Home</a>
        <a href="{% url 'dashboard' %}" data-nav-dashboard hidden>Dashboard</a>
        <a href="{% url 'manager-dashboard' %}" data-nav-manager hidden>Manager</a>
        <a href="{% url 'login-page' %}" data-nav-login>Login</a>
        <a class="pill" href="{% url 'register-page' %}" data-nav-register>Register</a>
        <button class="icon-btn theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">◐</button>
        <button class="btn btn-ghost btn-small" type="button" data-logout-btn hidden>Logout</button>
      </nav>
    </header>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>

    {% block content %}{% endblock %}

    <!-- Chat Widget -->
    <button class="floating-chat-btn" id="open-chat-btn" hidden>
      💬
      <span class="chat-badge" id="chat-badge" hidden>0</span>
    </button>
    <div id="chat-window" class="chat-window" hidden>
      <div class="chat-header">
        <h3>Team Chat</h3>
        <button class="icon-btn btn-small" id="close-chat-btn" type="button" aria-label="Close chat">✕</button>
      </div>
      <div class="chat-body" id="chat-messages">
        <!-- Messages loaded via JS -->
      </div>
      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" class="form-input" placeholder="Message... use @username" autocomplete="off" required>
        <button type="submit" class="btn btn-primary btn-small">Send</button>
      </form>
    </div>
  </div>
</body>
</html>
